<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DUDE Payment System</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="phone">

  <!-- ============ LOGIN ============ -->
  <section id="view-login" class="view active">
    <div class="login-wrap">
      <div class="login-logo">
        <svg width="72" height="72" viewBox="0 0 72 72" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="72" height="72" rx="20" fill="url(#lg1)"/>
          <!-- hand holding coin -->
          <ellipse cx="36" cy="28" rx="13" ry="13" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/>
          <text x="36" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="white" font-family="serif">₭</text>
          <!-- fingers -->
          <path d="M19 38 Q14 42 15 50 Q22 58 36 58 Q50 58 57 50 Q58 42 53 38 Q47 35 36 36 Q25 35 19 38Z" fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="1.2"/>
          <path d="M22 38 L20 52" stroke="white" stroke-width="1" opacity="0.5"/>
          <path d="M29 36 L27 53" stroke="white" stroke-width="1" opacity="0.5"/>
          <path d="M43 36 L45 53" stroke="white" stroke-width="1" opacity="0.5"/>
          <path d="M50 38 L52 52" stroke="white" stroke-width="1" opacity="0.5"/>
          <!-- shine -->
          <ellipse cx="31" cy="23" rx="4" ry="2.5" fill="rgba(255,255,255,0.3)" transform="rotate(-20 31 23)"/>
          <defs>
            <linearGradient id="lg1" x1="0" y1="0" x2="72" y2="72">
              <stop offset="0%" stop-color="#1A3A4A"/>
              <stop offset="100%" stop-color="#0D6B8C"/>
            </linearGradient>
          </defs>
        </svg>
      </div>
      <h1 class="login-title">DUDE<br><span>Payment System</span></h1>
      <p class="login-sub">Calculating and recording who owes who.<br>If we mess it up, at least we mess it up together.</p>
      <div class="field">
        <input type="text" id="login-user" placeholder=" " autocomplete="off">
        <label>User name</label>
      </div>
      <div class="field">
        <input type="password" id="login-pass" placeholder=" " maxlength="4" inputmode="numeric">
        <label>4-digit PIN</label>
      </div>
      <button class="btn-primary btn-confirm" onclick="doLogin()">Confirm</button>
      <p class="login-hint">try: <b>john</b> / <b>2580</b></p>
    </div>
  </section>

  <!-- ============ HOME ============ -->
  <section id="view-home" class="view">
    <header class="topbar">
      <button class="icon-btn" onclick="openMenu()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
      <div class="user-chip">
        <span id="home-username">—</span>
        <span class="date-pill" id="home-date">—</span>
      </div>
      <button class="icon-btn" onclick="logout()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </header>
    <div class="search-row">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="text" id="search-input" placeholder="Search by date or book keeper" oninput="renderHome()">
      </div>
      <button class="icon-btn square" onclick="toggleCalendar()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
    <div class="action-row">
      <button class="btn-create" onclick="goTo('create')">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 5v14M5 12h14" stroke="white" stroke-width="2.5" stroke-linecap="round"/></svg>
        Create New
      </button>
      <button class="btn-update" onclick="goTo('update')">Update</button>
    </div>
    <div class="action-row secondary">
      <button class="btn-more" onclick="toggleMoreFilter()">More</button>
      <button class="icon-btn square" onclick="toggleView()" id="view-toggle-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/><rect x="14" y="14" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="2"/></svg>
      </button>
    </div>
    <div id="more-filter" class="more-filter hidden">
      <button data-f="all"    class="chip active" onclick="setFilter('all')">All</button>
      <button data-f="paid"   class="chip"        onclick="setFilter('paid')">Paid</button>
      <button data-f="unpaid" class="chip"        onclick="setFilter('unpaid')">Unpaid</button>
      <button data-f="mine"   class="chip"        onclick="setFilter('mine')">My Book Keeper</button>
    </div>
    <div id="home-card-view" class="card-list"></div>
    <div id="home-table-view" class="table-wrap hidden"></div>
  </section>

  <!-- ============ MENU DRAWER ============ -->
  <div id="menu-overlay" class="overlay hidden" onclick="closeMenu()"></div>
  <nav id="menu-drawer" class="drawer">
    <div class="drawer-logo">
      <svg width="28" height="28" viewBox="0 0 72 72" fill="none"><rect width="72" height="72" rx="20" fill="url(#dlg)"/><ellipse cx="36" cy="28" rx="13" ry="13" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="1.5"/><text x="36" y="33" text-anchor="middle" font-size="14" font-weight="700" fill="white" font-family="serif">₭</text><path d="M19 38 Q14 42 15 50 Q22 58 36 58 Q50 58 57 50 Q58 42 53 38 Q47 35 36 36 Q25 35 19 38Z" fill="rgba(255,255,255,0.18)" stroke="white" stroke-width="1.2"/><defs><linearGradient id="dlg" x1="0" y1="0" x2="72" y2="72"><stop offset="0%" stop-color="#1A3A4A"/><stop offset="100%" stop-color="#0D6B8C"/></linearGradient></defs></svg>
      <span>DUDE</span>
    </div>
    <div class="drawer-items">
      <button onclick="goTo('user')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Users
      </button>
      <button onclick="goTo('contract')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Contract
      </button>
      <button onclick="goTo('setting')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        Setting
      </button>
    </div>
  </nav>

  <!-- ============ BILL DETAIL ============ -->
  <section id="view-detail" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Bill Detail</h2><span style="width:36px"></span>
    </header>
    <div id="detail-body" class="detail-body"></div>
  </section>

  <!-- ============ CREATE NEW ============ -->
  <section id="view-create" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Create New</h2><span style="width:36px"></span>
    </header>
    <div class="form-body" id="create-form-body"></div>
  </section>

  <!-- ============ UPDATE ============ -->
  <section id="view-update" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Update</h2><span style="width:36px"></span>
    </header>
    <div class="form-body">
      <div class="search-row" style="padding:0 0 12px">
        <div class="search-box">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4.3-4.3" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
          <input type="text" id="update-search" placeholder="Search date or book keeper" oninput="renderUpdateTable()">
        </div>
        <button class="icon-btn square" onclick="toggleUpdateCalendar()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="5" width="18" height="16" rx="2" stroke="currentColor" stroke-width="2"/><path d="M3 10h18M8 3v4M16 3v4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center">
        <select id="update-type-filter" class="form-select" onchange="renderUpdateTable()">
          <option value="">All Types</option>
          <option value="DRINK">Drink</option>
          <option value="FOOD">Food</option>
          <option value="OTHERS">Others</option>
        </select>
        <button class="btn-more" onclick="toggleUpdateMore()" style="white-space:nowrap">More</button>
      </div>
      <div id="update-more-filter" class="more-filter hidden" style="margin-bottom:10px">
        <button data-uf="all"    class="chip active" onclick="setUpdateFilter('all')">All</button>
        <button data-uf="paid"   class="chip"        onclick="setUpdateFilter('paid')">Paid</button>
        <button data-uf="unpaid" class="chip"        onclick="setUpdateFilter('unpaid')">Unpaid</button>
        <button data-uf="mine"   class="chip"        onclick="setUpdateFilter('mine')">My Book Keeper</button>
      </div>
      <div id="update-table-wrap" class="table-wrap"></div>
    </div>
  </section>

  <!-- ============ EDIT BILL ============ -->
  <section id="view-edit" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('update')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Edit Bill</h2><span style="width:36px"></span>
    </header>
    <div class="form-body" id="edit-form-body"></div>
  </section>

  <!-- ============ PAY ============ -->
  <section id="view-pay" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('detail')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Pay</h2><span style="width:36px"></span>
    </header>
    <div id="pay-body" class="pay-body"></div>
  </section>

  <!-- ============ SLIP VIEWER ============ -->
  <section id="view-slip" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('detail')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Payment Slip</h2><span style="width:36px"></span>
    </header>
    <div id="slip-body" class="pay-body"></div>
  </section>

  <!-- ============ USER ============ -->
  <section id="view-user" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Users</h2><span style="width:36px"></span>
    </header>
    <div id="user-list" class="user-list"></div>
  </section>

  <!-- ============ CONTRACT ============ -->
  <section id="view-contract" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Contract</h2><span style="width:36px"></span>
    </header>
    <div class="chat-wrap">
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-row">
        <input type="text" id="chat-input" placeholder="Message the admin...">
        <button onclick="sendMessage()" class="chat-send">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </button>
      </div>
    </div>
  </section>

  <!-- ============ SETTING ============ -->
  <section id="view-setting" class="view">
    <header class="subbar">
      <button class="icon-btn" onclick="goTo('home')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 19l-7-7 7-7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      <h2>Setting</h2><span style="width:36px"></span>
    </header>
    <div id="setting-body" class="form-body"></div>
  </section>

  <div id="toast" class="toast hidden"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
